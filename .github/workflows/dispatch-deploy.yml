name: Dispatch Leantime Build (kube-infra)

# When master is updated, ask intelli-verse-x/intelli-verse-kube-infra
# to rebuild and roll out the leantime image. Keeps build/deploy logic
# centralized in kube-infra (single source of truth for AWS creds + cluster access).
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kube-infra leantime-build workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_KUBE_INFRA }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::Secret GH_PAT_KUBE_INFRA is not configured on this repo."
            echo "Add a fine-grained PAT with 'Contents: write' on intelli-verse-x/intelli-verse-kube-infra to enable auto-deploy."
            exit 0
          fi
          curl -sSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/intelli-verse-x/intelli-verse-kube-infra/dispatches \
            -d "{\"event_type\":\"leantime-source-updated\",\"client_payload\":{\"ref\":\"$REF\",\"sha\":\"$SHA\"}}"
          echo "Dispatched leantime-source-updated for ref=$REF (sha=$SHA)"
