        <li>Requirement 3</li>
        </ul>
        </td>
        </tr>
        <tr style="height: 17px;">
        <td style="width: 17.3786%; height: 17px; background-color: #3598db;"><strong><span style="color: #ffffff;">In Scope Work</span></strong></td>
        <td style="height: 17px; width: 82.6214%;" colspan="3">
