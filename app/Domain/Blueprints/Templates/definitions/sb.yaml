  sb_description:
    icon: "fa-file-lines"
    title: "box.sb.description"
  sb_st_design:
    icon: "fa-user-tie"
    title: "box.sb.st_design"
  sb_st_decision:
    icon: "fa-sitemap"
    title: "box.sb.st_decision"
  sb_st_experts:
    icon: "fa-chalkboard-user"
    title: "box.sb.st_experts"
  sb_st_support:
    icon: "fa-person-circle-question"
    title: "box.sb.st_support"
  sb_budget:
    icon: "fa-money-bills"
    title: "box.sb.budget"
  sb_time:
    icon: "fa-business-time"
