text.discord_instructions="سيقوم هذا التكامل بنشر إشعارات التحديث في القناة التي تختارها.<br/>اتبع التعليمات <a href='https://support.discord.com/hc/en-us/articles/228383668-Intro-to-Webhooks' target='_blank'>هنا لإنشاء webhook جديد (أو روابط جديدة)</a>، ثم قم بلصق الرابط (أو الروابط) في الحقول الموجودة على اليمين وانقر فوق حفظ."
