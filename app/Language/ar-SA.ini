text.these_are_system_wide_settings="هذه إعدادات شاملة للنظام ستؤثر على المظهر والأسلوب لتجربة leantime الخاصة بك."
text.company_name_helper="يظهر في عنوان الصفحة وفي رسائل البريد الإلكتروني"
text.advanced_boards_helper_content="تتطور الأفكار وتنمو وتنضج. هذا هو المكان لتتبعها.<br/>انقل بطاقات الأفكار من عمود إلى آخر لتعكس حالتها الراهنة.<br/>هذا مكان جيد لبدء البحث، وتطوير النماذج الأولية، والتحقق من صحة هذه النماذج مع عدد قليل من العملاء قبل البدء في التنفيذ."
text.backlog_helper_content="المهام المتراكمة هو موطن جميع مهامك؛ تلك التي تعمل عليها حالياً والتي تخطط للعمل عليها.<br/><br/>لتحقيق تقدم نحو إكمال المهام المتراكمة الخاص بك، نوصي بالعمل في دورات قصيرة - السبرنتات.<br/>السبرنت هي فترات زمنية مدتها أسبوعان تسمح لك بالتركيز على أجزاء أصغر وقابلة للتنفيذ من العمل.<br>في نهاية الأسبوعين، يجب أن يكون لديك شيء لتقديمه في "عرض توضيحي" (demo). شيء يقدم قيمة لمستخدميك أو عملائك.<br/><br>في هذه الشاشة، ستتمكن من تنظيم وإدارة قائمة مهامك، وتحديد أولويات المهام المتراكمة عبر السحب والإفلات ونقل عناصر المهام المتراكمة إلى السبرنت الحالي.<br>هل تريد المزيد من المعلومات؟ ابدأ الجولة أو أغلق للبدء!"
text.glad_youre_here="نحن سعداء بوجودك هنا. لنأخذ دقيقة لنتعارف."
text.business_research_section="قسم أبحاث الأعمال لدينا هو موطنك الجديد لأفكارك. تم تصميم هذا القسم ليأخذك عبر خطوات تطوير العملاء، والبحث عن المشكلات، وتوليد أفكار الحلول."
text.our_roadmap_design="تم تصميم خارطة طريقنا لتأخذك من مراحل إنجاز صغيرة يمكن إدارتها إلى إتمام الصورة الكاملة. خطط لمراحل إنجاز مدتها حوالي 3 أشهر واستخدم علامات المشروع هذه للبقاء على المسار الصحيح."
text.this_is_where_you_spend_most_time="هنا ستقضي معظم وقتك - في التنفيذ. خطط لدورات العمل التي تستغرق أسبوعين ونفذ بنجاح باستخدام لوحة كانبان وأدوات قائمة المهام لدينا. إستخدم الدراسات الإستعادية للنمو في دورة العمل القادمة."
text.idea_board_helper_content="هذا هو المكان لجمع كل أفكارك. ناقش أفكاراً جديدة مع فريقك وأرفق معالم رئيسية لمتابعة التقدم نحو أفكارك."
text.kanban_helper_content="كانبان هي الكلمة اليابانية لـ "بطاقة". بدأ مهندسو تويوتا استخدام لوحات كانبان في الأربعينيات مع التصنيع الرشيق.<br/>تُستخدم لمشاركة المعلومات وتقدم العمل بصرياً وبسرعة.<br/>تعد لوحات كانبان مفيدة لتصور العمل وحالته، وللمساعدة في إدارة العمل النشط أو قيد التنفيذ، وإدارة تدفق العمل، والتصرف بسرعة نحو التحسينات الرشيقة."
text.my_timesheets_helper_content="سجلات الوقت هي المكان لتتبع الساعات الفعلية التي تم العمل بها في مهمة ما.<br/>هذا مفيد لأغراض الفوترة وأيضاً للتحقق من مدى جودة تخطيطك لمهامك مسبقاً.<br/>يمكن لـ Overtime leantime تعديل تواريخ الاستحقاق لمراعاة اختلافات التخطيط."
text.new_project_helper_content="<p>هذا هو المكان الذي ستصف فيه مشروعك، وتحدده، وتضع معاييره. هذا أمر مهم لأنه الجزء الذي يوضح للفريق<br/>بأكمله أولويات المشروع وتوقعاته وإرشاداته.</p><p><br/><em>أمور يجب التفكير فيها هنا: الـ 4Cs.<br/>كن واضحاً، ومختصراً، وكاملاً، وموثوقاً.<br/><br/></em></p><p>إن إتقان هذه الأمور في أوصاف مشاريعك يبقي الجميع على نفس المسار ويساعد في تقليل مخاطر الخطأ أو العثرات.</p><br/>حان وقت البدء!<br/><br/>"
text.not_found_helper_content="<p>ليس لدينا محتوى لهذه الصفحة بعد.<br/>يرجى استخدام رابط 'هل تحتاج إلى مساعدة' في الأسفل لمعرفة المزيد حول الأشياء التي يمكنك القيام بها هنا.</p>"
text.retros_helper_content="<p>تُعد الدراسات الإسترجاعية تأملات سريعة حول العمل، وأداء الفريق، وبالطبع التقدم المحرز.<br/>هنا يمكن لفريقك تخصيص لحظة للتركيز على ما سار بشكل جيد، وما لم يسر بشكل جيد، وما يمكن القيام به بشكل مختلف في المرة القادمة.<br/>نوصي بعقد اجتماع مراجعة على فترات منتظمة، أو كحد أدنى، في نهاية كل مرحلة رئيسية.<br/></p>"
text.roadmap_helper_content="<p>تساعد خرائط الطريق في تقسيم المشاريع الكبيرة إلى أجزاء أصغر وأكثر قابلية للإدارة.<br/><br/></p><p>لإنشاء خارطة الطريق الخاصة بك، نوصي بتحديد معالم رئيسية يمكن تحقيقها في غضون فترة زمنية مدتها 3 أشهر.</p><p>محطات رئيسية هي نقاط تفتيش في الطريق نحو إتمام المشروع.<br/>ببساطة: إذا كنت في رحلة برية عبر البلاد، فإن كل ولاية تمر بها يمكن أن تكون محطة رئيسية.<br/><br>انقر فوق 'إضافة معلم رئيسي' في الجانب العلوي الأيسر للبدء. حدد التاريخ في هذا التبويب أو في مخطط خارطة الطريق نفسه عن طريق النقر وسحب المحطة الرئيسية داخل التقويم.</p>"
text.show_clients_helper_content="<p>العملاء/المنتجات تنظم مشاريعك في فئات وتتيح لك عزل المجموعات المختلفة.<br/><br/></p><p>بصفتك مستشارًا، فأنت تعمل مع العملاء بالفعل وسيكون هذا هو المكان لتنظيمهم.</p><p>إذا كنت فريق منتجات، يمكنك استخدام هذا القسم لتنظيم وعزل أقسامك (التسويق، المبيعات، العمليات، إلخ).</p>"
text.show_projects_helper_content="<p>المشاريع هي قلب أعمالك وLeantime! التغيير، والتطوير، والأهداف، وأي شيء يمكنك بناؤه أو الحلم به سيتضمن مشاريع.<br/>إدارة المشاريع هي ببساطة عملية ضمان تسليم مشاريعك في الوقت المحدد، وبشكل صحيح، وبقيمة تجارية حقيقية.<br/><br>هذا هو المكان الذي ستعيش فيه مشاريعك. ستسمح لك صفحة مشاريعك بإنشاء مشروع، ورؤية أعداد المهام، والساعات، والميزانية بالدولار، والعميل المرتبط بالمشروع بسرعة.<br/><br>إستخدم هذه الصفحة للحصول على نظرة عامة سريعة على جميع مشاريعك.<br/><br/></p>"
text.new_db_version="تم تثبيت إصدار جديد. لإستخدام Leantime، ستحتاج إلى تحديث قاعدة بياناتك.<br/><br/><strong>يرجى التأكد من عمل نسخة احتياطية لقاعدة بياناتك قبل إجراء هذا التحديث!</strong><br/>قد يستغرق هذا بضع دقائق."
text.update_was_successful="تم التحديث بنجاح، يمكنك الآن تسجيل الدخول. <a href='%1$s'>الإنتقال إلى تسجيل الدخول</a>"
