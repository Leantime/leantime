text.who_can_access="اختر من يُسمح له بمشاهدة هذا المشروع. افتراضياً، سيرث المستخدمون الأدوار التي تم إعدادهم بها. يمكنك تغيير هذه الأدوار ضمن علامة التبويب 'الفريق'."
text.ical_export_description="هنا يمكنك إنشاء رابط تقويم فريد يتيح لك دمج تقويم Leantime الخاص بك في أي تطبيق يدعم تنسيق 'iCal'."
text.you_ical_url="رابط تقويمك موجود أدناه. <br /> يرجى ملاحظة أن أي شخص لديه هذا الرابط يمكنه الوصول إلى التقويم. حافظ عليه سرياً كما تفعل مع كلمة المرور."
