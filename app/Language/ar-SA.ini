text.insights.helper_content="تساعدك لوحة <em>الملاحظة / التعلم - الرؤى</em> على جمع وهيكلة الرؤى من أربعة مصادر مختلفة (الملاحظات الإثنوغرافية، والمقابلات، ومجموعات التركيز، والبحوث الثانوية) وتحويلها إلى معرفة.<br/>إنها تدعم مرحلتي الملاحظة والتعلم، والتي تُسمى أحياناً التعاطف والتعريف، في عملية التفكير التصميمي.<br/>يمكنك العثور على مزيد من التفاصيل في الفصول 2 و8 و9 من كتاب <a href='https://inov.at/dts'></em>التفكير التصميمي للاستراتيجية</em></a>.<br/>نقترح عليك استخدام لوحة <em>الملاحظة / التعلم - الرؤى</em> في كل مرة تقوم فيها بجمع وتحليل رؤى جديدة، سواء كان ذلك لإجراء تحليل للمخاطر، أو تحليل بيئي، أو اكتشاف اتجاهات الصناعة، أو لتصميم منتجات وخدمات جديدة، على سبيل المثال لا الحصر."
