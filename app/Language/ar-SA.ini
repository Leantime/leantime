## Strategy Message=

headline.sm.board="لوحة رسائل الإستراتيجية"

box.sm.qa="من هي <em>شرائح العملاء المستهدفة</em> ومن <em>خارج النطاق صراحةً</em>؟"
box.sm.qb="ما <em>القيمة المقترحة</em> التي ستقدمها لعملائك المستهدفين؟"
box.sm.qc="لماذا يجب على العملاء إختيار التعامل معك، بدلاً من التعامل مع منافسيك؟ ما هي <em>خصائصنا المتميزة</em> التي يصعب تقليدها؟"
box.sm.qd="لماذا ستكون قادراً على الوفاء بالوعود المقدمة لعملائك؟ أي <em>قدرات فريدة</em> تمتلكها وتستغلها؟"
box.sm.qe="ما الذي س<em>يتغير</em> مع الإستراتيجية الجديدة أو المعدلة وما الذي <em>سيبقى كما هو</em> بمرور الوقت؟ كيف تضمن عدم فقدان العملاء الحاليين، الذين يظلون ضمن النطاق؟"
box.sm.qf="لماذا ستسمح الإستراتيجية <em>بتوليد و/أو زيادة الأرباح بمرور الوقت</em>؟"
box.sm.qg="ما هي الأهداف المحددة بالإستراتيجية الجديدة أو المعدلة <em>القابلة للتحقيق بشكل واقعي</em>؟"

label.sm.title_new="ما عنوان رسالتك الإستراتيجية الجديدة؟"
label.sm.title_edited="ما هو العنوان الجديد لرسالة إستراتيجيتك؟"
