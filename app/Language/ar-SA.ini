text.lean.helper_content="سيوجهك مخطط Lean Canvas عبر عملية التحقق الكاملة من فكرة عملك و/أو فكرة منتجك الجديدة.<br/>ستتناول <em>شريحة العملاء</em>، <em>المشكلة، الحل</em>.<br/>ومن هناك، ستنتقل إلى <em>القيمة المقترحة الفريدة</em> (ما الذي يجعل فكرتك أفضل من العروض الأخرى؟)، و<em>قنوات التوزيع</em> (كيف ستوصل حلك إلى عملائك؟)، و<em>مصادر الإيرادات</em> (كيف سيحقق حلك الأرباح؟)، و<em>هيكل التكاليف</em> (ما هي قيمة حلك؟)، <em>المقاسات الرئيسية</em> (كيف ستقيس النجاح؟)، و<em>الميزة غير العادلة</em> (ما الذي تملكه وسيساعدك على النجاح ضد المنافسين؟)<br/>إن الإجابة على هذه الأسئلة مصممة لتعزيز النجاح، والحد من الفشل، وتسمح لك بتتبع واختبار فرضياتك. إن إتباع نهج Lean يتمثل في التخلص من الهدر والعمل على بناء المنتجات والأعمال والحلول التي يحتاجها عملاؤك."
text.lean.disclaimer="تم إقتباس Lean Canvas من <a href='https://strategyzer.com/' target='_blank'>مخطط نموذج العمل التجاري</a> وهو مرخص بموجب رخصة <a href='https://creativecommons.org/licenses/by-sa/3.0/'>المشاع الإبداعي نَسْبُ المُصنَّف - بالمِثْل 3.0</a>"
tour.lean.once_your_done="<em>بمجرد أن تشعر بالإرتياح تجاه نموذج العمل الرشيق الخاص بك، إنتقل إلى</em><br/><a href='%s/tickets/roadmap/' class='btn btn-primary'><span class='fas fa-map'></span> مخطط خارطة الطريق</a>"


