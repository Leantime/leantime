text.choose_access_for_users="قم بتحديد أو إلغاء تحديد المستخدمين الذين تريد إضافتهم/إزالتهم. يمكنك معرفة المزيد عن الأدوار في <a href='https://docs.leantime.io/#/using-leantime/user-management?id=roles' target='_blank'>https://docs.leantime.io</a>"
